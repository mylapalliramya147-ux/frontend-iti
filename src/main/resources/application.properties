spring.application.name=frontend

# Backend API Configuration
# Points to the Reports backend REST API (C:\Dev\Projects\NIC\Reports).
# Base URL: http://localhost:5050/itiapreports
# REST API prefix: /api/reports
backend.api.base-url=http://localhost:5050/itiapreports
backend.api.reports-path=/api/reports

# Server Configuration
server.port=5051

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.server.frontend=DEBUG
